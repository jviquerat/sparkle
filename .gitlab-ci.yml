sparkle-job:
  script:
    - whoami
    - python3 -m venv venv
    - source venv/bin/activate
    - pip3 install -r requirements.txt
    - pip3 install -e .
    - pytest
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  tags:
    - sparkle-ubuntu
