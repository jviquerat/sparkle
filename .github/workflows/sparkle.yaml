name: sparkle

# Triggers testing
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: mpi4py/setup-mpi@v1
    - name: Set-up python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10.12
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Test with pytest # This automatically installs dependencies
      run: |
        uv run pytest
